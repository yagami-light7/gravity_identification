<line x1="90" y1="138.0" x2="930" y2="138.0" class="grid"/>
<text x="78" y="143.0" text-anchor="end" class="tick">2.3e-16</text>
<line x1="90" y1="60.0" x2="930" y2="60.0" class="grid"/>
