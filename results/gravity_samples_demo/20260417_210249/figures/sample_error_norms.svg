<line x1="90" y1="450.0" x2="930" y2="450.0" class="grid"/>
<text x="78" y="455.0" text-anchor="end" class="tick">0</text>
<line x1="90" y1="372.0" x2="930" y2="372.0" class="grid"/>
<text x="78" y="377.0" text-anchor="end" class="tick">5.7e-17</text>
<line x1="90" y1="294.0" x2="930" y2="294.0" class="grid"/>
<text x="78" y="299.0" text-anchor="end" class="tick">1.1e-16</text>
<line x1="90" y1="215.99999999999997" x2="930" y2="215.99999999999997" class="grid"/>
